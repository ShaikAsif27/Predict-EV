{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Service Provider Admin Login — EV Analytics Platform">
  <title>Admin Login — EV Analytics Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'custom.css' %}" rel="stylesheet">
</head>
<body>

<div class="ev-orb ev-orb-1" style="background:var(--accent-violet);"></div>
<div class="ev-orb ev-orb-2"></div>
<div class="ev-orb ev-orb-3"></div>

<div class="ev-auth-wrapper">
  <div class="ev-auth-container">

    <!-- Logo / Branding -->
    <div class="ev-auth-logo">
      <div class="logo-badge" style="background:linear-gradient(135deg,var(--accent-violet),var(--accent-indigo));">🛡️</div>
      <h1><span style="background:linear-gradient(135deg,var(--accent-violet-light),var(--accent-indigo-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Admin Portal</span></h1>
      <p>Service Provider access for model management, analytics, and user oversight</p>

      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
        <span style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-violet-light);letter-spacing:0.05em;">
          <i class="bi bi-cpu me-1"></i>Model Training
        </span>
        <span style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-indigo-light);letter-spacing:0.05em;">
          <i class="bi bi-bar-chart me-1"></i>Analytics
        </span>
        <span style="background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-cyan);letter-spacing:0.05em;">
          <i class="bi bi-people me-1"></i>Users
        </span>
      </div>
    </div>

    <!-- Login Card -->
    <div class="ev-auth-card" style="border-color:rgba(124,58,237,0.15);">
      <h2><i class="bi bi-shield-lock-fill" style="color:var(--accent-violet-light)"></i> Admin Sign In</h2>

      <form method="POST" role="form" autocomplete="off">
        {% csrf_token %}

        <div class="ev-form-group">
          <label for="sp_username"><i class="bi bi-person-badge-fill"></i> Admin Username</label>
          <input type="text" id="sp_username" name="username" class="ev-form-control"
                 placeholder="Enter admin username" required>
        </div>

        <div class="ev-form-group">
          <label for="sp_password"><i class="bi bi-lock-fill"></i> Admin Password</label>
          <input type="password" id="sp_password" name="password" class="ev-form-control"
                 placeholder="Enter admin password" required>
        </div>

        <button type="submit" name="submit1" id="adminLoginBtn"
                class="ev-btn ev-btn-full ev-btn-lg"
                style="background:linear-gradient(135deg,var(--accent-violet),var(--accent-indigo));color:#fff;margin-top:0.75rem;box-shadow:0 4px 16px rgba(124,58,237,0.4);">
          <i class="bi bi-box-arrow-in-right"></i> Sign In as Admin
        </button>
      </form>

      <div class="ev-divider"><span>or</span></div>

      <div class="ev-auth-footer">
        <a href="{% url 'login' %}">
          <i class="bi bi-person-fill"></i> Remote User Login
        </a>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.5rem;font-size:0.75rem;color:var(--text-muted);">
      <i class="bi bi-incognito me-1"></i>
      Restricted access · Authorized personnel only
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
