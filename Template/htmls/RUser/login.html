{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to EV Analytics — AI-Powered Electric Vehicle Energy Prediction Platform">
  <title>Sign In — EV Analytics Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'custom.css' %}" rel="stylesheet">
</head>
<body>

<div class="ev-orb ev-orb-1"></div>
<div class="ev-orb ev-orb-2"></div>
<div class="ev-orb ev-orb-3"></div>

<div class="ev-auth-wrapper">
  <div class="ev-auth-container">

    <!-- Logo / Branding -->
    <div class="ev-auth-logo">
      <div class="logo-badge">⚡</div>
      <h1><span style="background:linear-gradient(135deg,var(--accent-indigo-light),var(--accent-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">EV Analytics</span></h1>
      <p>AI-Powered Electric Vehicle Energy Consumption Prediction Platform</p>

      <!-- Feature pills -->
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
        <span style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-indigo-light);letter-spacing:0.05em;">
          <i class="bi bi-cpu me-1"></i>ML Ensemble
        </span>
        <span style="background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-cyan);letter-spacing:0.05em;">
          <i class="bi bi-lightning-charge me-1"></i>Real-time
        </span>
        <span style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:99px;padding:0.2rem 0.6rem;font-size:0.68rem;font-weight:600;color:var(--accent-emerald-light);letter-spacing:0.05em;">
          <i class="bi bi-shield-check me-1"></i>Secure
        </span>
      </div>
    </div>

    <!-- Login Card -->
    <div class="ev-auth-card">
      <h2><i class="bi bi-person-lock" style="color:var(--accent-indigo-light)"></i> Remote User Sign In</h2>

      <form method="POST" role="form" autocomplete="off">
        {% csrf_token %}

        <div class="ev-form-group">
          <label for="username"><i class="bi bi-person-fill"></i> Username</label>
          <input type="text" id="username" name="username" class="ev-form-control"
                 placeholder="Enter your username" required>
        </div>

        <div class="ev-form-group">
          <label for="password"><i class="bi bi-lock-fill"></i> Password</label>
          <input type="password" id="password" name="password" class="ev-form-control"
                 placeholder="Enter your password" required>
        </div>

        <button type="submit" name="submit1" id="loginBtn" class="ev-btn ev-btn-primary ev-btn-lg ev-btn-full" style="margin-top:0.75rem;">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div class="ev-divider"><span>or continue as</span></div>

      <div class="ev-auth-footer">
        <a href="{% url 'serviceproviderlogin' %}">
          <i class="bi bi-shield-lock-fill"></i> Service Provider
        </a>
        <a href="{% url 'Register1' %}">
          <i class="bi bi-person-plus-fill"></i> Register Account
        </a>
      </div>
    </div>

    <!-- Bottom tagline -->
    <div style="text-align:center;margin-top:1.5rem;font-size:0.75rem;color:var(--text-muted);">
      <i class="bi bi-shield-lock me-1"></i>
      Secured · Private · Powered by Machine Learning
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Button loading animation
  document.getElementById('loginBtn').addEventListener('click', function() {
    this.innerHTML = '<i class="bi bi-arrow-repeat spin me-1"></i> Authenticating...';
  });
</script>
<style>
  @keyframes spin { from {transform:rotate(0)} to {transform:rotate(360deg)} }
  .spin { display:inline-block; animation:spin 1s linear infinite; }
</style>
</body>
</html>
